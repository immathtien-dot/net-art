<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doll House</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="scene" aria-label="Outside scene">
      <div class="houseStage" aria-label="House stage">
        <img
          id="house"
          class="houseImage"
          src="./assets/images/out.png"
          alt="House"
          draggable="false"
        />

        <nav class="roomSigns" aria-label="Room links">
          <a class="roomSign roomSign--kitchen" href="./rooms/kitchen.html">
            <span class="roomSign__box">Kitchen</span>
          </a>
          <a class="roomSign roomSign--bathroom" href="./rooms/bathroom.html">
            <span class="roomSign__box">Bathroom</span>
          </a>
          <a class="roomSign roomSign--bedroom" href="./rooms/bedroom.html">
            <span class="roomSign__box">Bedroom</span>
          </a>
          <a class="roomSign roomSign--dining" href="./rooms/dining.html">
            <span class="roomSign__box">Dining</span>
          </a>
        </nav>
      </div>
      <div class="title">
        <h1 class="main">Welcome Home</h1>
        <a id="enter" class="subtitle subtitle--cta" href="#" aria-label="Enter to continue">
          Enter to continue
        </a>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.0/lib/p5.min.js"></script>
    <script src="./scripts/main.js"></script>
    <script src="./scripts/sketch.js"></script>
  </body>
</html>
